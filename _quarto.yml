  description: "Urban Health Summer Institute | Drexel University Dornsife School of Public Health"
  # favicon: "images/favicon.png"  # uncomment after adding a favicon image
  site-url: https://aquistberg.github.io/intro-gis-ph/  # update with your actual GitHub Pages URL
  repo-url: https://github.com/aquistberg/intro-gis-ph  # update with your actual repo URL
