          - text: "Day 2: Projections & Data Entry"
            href: sessions/day2.qmd
          - text: "Day 3: Data Management & Spatial Analysis"
            href: sessions/day3.qmd
          - text: "Day 4: Network Analysis, Geocoding & Raster"
            href: sessions/day4.qmd
          - text: "Day 5: Spatial Estimation & Map Design"
            href: sessions/day5.qmd
      - text: "Readings"
        href: readings.qmd
      - text: "Resources"
        href: resources.qmd
      - text: "Setup"
        href: setup.qmd

  sidebar: false

